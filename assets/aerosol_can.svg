      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
        <defs>
          <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feFlood flood-color="#00000030"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="blur"><feGaussianBlur stdDeviation="2.8"/></filter>
          <linearGradient id="acGrad" x1="0%" y1="0%" x2="100%" y2="0"><stop offset="0%" stop-color="#455A64"/><stop offset="18%" stop-color="#455A64"/><stop offset="45%" stop-color="#90A4AE"/><stop offset="55%" stop-color="#90A4AE"/><stop offset="82%" stop-color="#455A64"/><stop offset="100%" stop-color="#455A64"/></linearGradient>
        </defs>
        <rect width="200" height="200" rx="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

<!-- body -->
<rect x="68" y="68" width="64" height="100" rx="4" fill="url(#acGrad)" stroke="#2D2D2D" stroke-width="1.8" filter="url(#shadow)"/>
<ellipse cx="100" cy="68" rx="32" ry="8" fill="#546E7A" stroke="#2D2D2D" stroke-width="1.5"/>
<ellipse cx="100" cy="168" rx="32" ry="8" fill="#37474F" stroke="#2D2D2D" stroke-width="1.5"/>
<!-- neck taper -->
<path d="M68,68 L72,52 L128,52 L132,68" fill="#546E7A" stroke="#2D2D2D" stroke-width="1.5"/>
<ellipse cx="100" cy="52" rx="28" ry="7" fill="#607D8B" stroke="#2D2D2D" stroke-width="1.5"/>
<!-- nozzle -->
<rect x="90" y="38" width="20" height="16" rx="4" fill="#37474F" stroke="#2D2D2D" stroke-width="1.5"/>
<!-- spray button -->
<rect x="82" y="32" width="36" height="10" rx="5" fill="#263238" stroke="#2D2D2D" stroke-width="1.5"/>
<!-- spray particles -->
<circle cx="68" cy="28" r="4" fill="#90A4AE" opacity="0.7"/>
<circle cx="56" cy="20" r="3" fill="#90A4AE" opacity="0.5"/>
<circle cx="72" cy="18" r="2.5" fill="#90A4AE" opacity="0.4"/>
<circle cx="60" cy="34" r="2" fill="#90A4AE" opacity="0.3"/>
<!-- label -->
<rect x="70" y="82" width="60" height="48" rx="3" fill="#B0BEC5" opacity="0.5"/>
<!-- specular -->
<rect x="72" y="76" width="7" height="80" rx="3" fill="white" opacity="0.2"/>
<text x="100" y="190" font-family="Arial" font-size="9" fill="#546E7A" text-anchor="middle">AEROSOL CAN</text>

      </svg>