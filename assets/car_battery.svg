      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
        <defs>
          <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feFlood flood-color="#00000030"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="blur"><feGaussianBlur stdDeviation="2.8"/></filter>
          <linearGradient id="carbGrad" x1="0%" y1="0%" x2="0%" y2="100"><stop offset="0%" stop-color="#546E7A"/><stop offset="100%" stop-color="#263238"/></linearGradient><linearGradient id="carbTop" x1="0%" y1="0%" x2="0%" y2="100"><stop offset="0%" stop-color="#607D8B"/><stop offset="100%" stop-color="#455A64"/></linearGradient>
        </defs>
        <rect width="200" height="200" rx="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

<!-- main case -->
<rect x="24" y="68" width="152" height="108" rx="7" fill="url(#carbGrad)" stroke="#1A1A2E" stroke-width="2" filter="url(#shadow)"/>
<!-- top surface -->
<rect x="24" y="68" width="152" height="22" rx="7" fill="url(#carbTop)" stroke="#1A1A2E" stroke-width="2"/>
<!-- bottom border -->
<rect x="24" y="154" width="152" height="22" rx="7" fill="#263238" stroke="#1A1A2E" stroke-width="2"/>
<!-- positive terminal post -->
<rect x="48" y="52" width="32" height="22" rx="4" fill="#455A64" stroke="#1A1A2E" stroke-width="1.5"/>
<circle cx="64" cy="56" r="10" fill="#E53935" stroke="#B71C1C" stroke-width="2"/>
<text x="64" y="57" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">+</text>
<!-- negative terminal post -->
<rect x="120" y="52" width="32" height="22" rx="4" fill="#455A64" stroke="#1A1A2E" stroke-width="1.5"/>
<circle cx="136" cy="56" r="10" fill="#212121" stroke="#424242" stroke-width="2"/>
<text x="136" y="57" font-family="Arial" font-size="14" font-weight="bold" fill="#90A4AE" text-anchor="middle" dominant-baseline="middle">−</text>
<!-- handle grip -->
<path d="M 80,68 Q 80,48 100,48 Q 120,48 120,68" fill="none" stroke="#546E7A" stroke-width="12" stroke-linecap="round"/>
<!-- label -->
<rect x="32" y="92" width="136" height="50" rx="4" fill="#37474F"/>
<text x="100" y="114" font-family="Arial" font-size="11" font-weight="bold" fill="#CFD8DC" text-anchor="middle">CAR BATTERY</text>
<text x="100" y="130" font-family="Arial" font-size="9" fill="#78909C" text-anchor="middle">12V  HAZARDOUS</text>
<!-- side handles -->
<rect x="16" y="90" width="10" height="30" rx="5" fill="#37474F" stroke="#1A1A2E" stroke-width="1.5"/>
<rect x="174" y="90" width="10" height="30" rx="5" fill="#37474F" stroke="#1A1A2E" stroke-width="1.5"/>

      </svg>