      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
        <defs>
          <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feFlood flood-color="#00000030"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="blur"><feGaussianBlur stdDeviation="2.8"/></filter>
          <linearGradient id="cbGrad" x1="0%" y1="0%" x2="0%" y2="100"><stop offset="0%" stop-color="#1565C0"/><stop offset="100%" stop-color="#0D47A1"/></linearGradient>
        </defs>
        <rect width="200" height="200" rx="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

<!-- box body -->
<rect x="40" y="30" width="120" height="148" rx="5" fill="url(#cbGrad)" stroke="#0D47A1" stroke-width="1.8" filter="url(#shadow)"/>
<!-- label area -->
<rect x="44" y="55" width="112" height="80" rx="3" fill="#1976D2"/>
<!-- brand blurred -->
<text x="100" y="95" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle" filter="url(#blur)">WEETBIX</text>
<text x="100" y="95" font-family="Arial" font-size="22" font-weight="bold" fill="white" opacity="0.35" text-anchor="middle">WEETBIX</text>
<text x="100" y="115" font-family="Arial" font-size="9" fill="#90CAF9" text-anchor="middle">WHOLE GRAIN CEREAL</text>
<!-- top flap -->
<rect x="40" y="30" width="120" height="22" rx="5" fill="#0D47A1" stroke="#0D47A1" stroke-width="1"/>
<!-- bottom -->
<rect x="40" y="156" width="120" height="22" rx="5" fill="#0D47A1"/>
<!-- side shadow -->
<rect x="152" y="30" width="8" height="148" rx="3" fill="#0A3880" opacity="0.6"/>

      </svg>