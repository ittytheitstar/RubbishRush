      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
        <defs>
          <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feFlood flood-color="#00000030"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="blur"><feGaussianBlur stdDeviation="2.8"/></filter>
          <linearGradient id="cpGrad" x1="0%" y1="0%" x2="100%" y2="0"><stop offset="0%" stop-color="#B71C1C"/><stop offset="40%" stop-color="#E53935"/><stop offset="60%" stop-color="#E53935"/><stop offset="100%" stop-color="#B71C1C"/></linearGradient><linearGradient id="cpFoil" x1="0%" y1="0%" x2="100%" y2="0"><stop offset="0%" stop-color="#9E9E9E"/><stop offset="30%" stop-color="#E0E0E0"/><stop offset="70%" stop-color="#E0E0E0"/><stop offset="100%" stop-color="#9E9E9E"/></linearGradient>
        </defs>
        <rect width="200" height="200" rx="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

<!-- bag shape – wider in middle, pinched at top and bottom -->
<path d="M 78,40 C 70,40 62,44 60,52 L 52,150 C 50,162 68,168 100,168 C 132,168 150,162 148,150 L 140,52 C 138,44 130,40 122,40 Z"
      fill="url(#cpGrad)" stroke="#7B1111" stroke-width="1.8" filter="url(#shadow)"/>
<!-- foil top seal -->
<ellipse cx="100" cy="40" rx="22" ry="7" fill="url(#cpFoil)" stroke="#757575" stroke-width="1.5"/>
<!-- label area -->
<ellipse cx="100" cy="105" rx="42" ry="32" fill="#C62828" opacity="0.5"/>
<!-- brand text -->
<text x="100" y="98" font-family="Arial" font-size="13" font-weight="bold" fill="#FFD600" text-anchor="middle">CHIPS</text>
<text x="100" y="113" font-family="Arial" font-size="8" fill="#FFEE58" text-anchor="middle">ORIGINAL FLAVOUR</text>
<!-- foil bottom seal -->
<ellipse cx="100" cy="168" rx="48" ry="8" fill="url(#cpFoil)" stroke="#757575" stroke-width="1.5"/>
<!-- highlight -->
<path d="M70,52 C68,52 64,58 62,68 L58,140 C58,145 62,147 65,146 C63,143 62,138 63,132 L67,62 C68,54 72,50 74,50 Z" fill="white" opacity="0.2"/>

      </svg>