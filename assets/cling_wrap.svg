      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
        <defs>
          <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feFlood flood-color="#00000030"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="blur"><feGaussianBlur stdDeviation="2.8"/></filter>
          <linearGradient id="cwGrad" x1="0%" y1="0%" x2="100%" y2="0"><stop offset="0%" stop-color="#90CAF9"/><stop offset="18%" stop-color="#90CAF9"/><stop offset="45%" stop-color="#E3F2FD"/><stop offset="55%" stop-color="#E3F2FD"/><stop offset="82%" stop-color="#90CAF9"/><stop offset="100%" stop-color="#90CAF9"/></linearGradient><linearGradient id="cwEdge" x1="0%" y1="0%" x2="0%" y2="100"><stop offset="0%" stop-color="#64B5F6"/><stop offset="100%" stop-color="#1565C0"/></linearGradient>
        </defs>
        <rect width="200" height="200" rx="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

<!-- roll body -->
<rect x="44" y="72" width="112" height="58" fill="url(#cwGrad)" stroke="#1565C0" stroke-width="1.8" filter="url(#shadow)"/>
<!-- left end ellipse -->
<ellipse cx="44" cy="101" rx="12" ry="29" fill="url(#cwEdge)" stroke="#1565C0" stroke-width="1.5"/>
<!-- right end ellipse -->
<ellipse cx="156" cy="101" rx="12" ry="29" fill="url(#cwEdge)" stroke="#1565C0" stroke-width="1.5"/>
<!-- wrap lines showing transparency -->
<line x1="44" y1="88" x2="156" y2="88" stroke="#BBDEFB" stroke-width="1.2" opacity="0.7"/>
<line x1="44" y1="101" x2="156" y2="101" stroke="#BBDEFB" stroke-width="1.2" opacity="0.7"/>
<line x1="44" y1="114" x2="156" y2="114" stroke="#BBDEFB" stroke-width="1.2" opacity="0.7"/>
<!-- label strip -->
<rect x="72" y="82" width="56" height="38" rx="3" fill="#E3F2FD" stroke="#BBDEFB" stroke-width="1"/>
<text x="100" y="96" font-family="Arial" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">CLING</text>
<text x="100" y="108" font-family="Arial" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">WRAP</text>
<!-- free tail of wrap -->
<path d="M156,130 Q175,135 178,148" fill="none" stroke="#90CAF9" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
<text x="100" y="180" font-family="Arial" font-size="9" fill="#1565C0" text-anchor="middle">CLING WRAP</text>

      </svg>