      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
        <defs>
          <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feFlood flood-color="#00000030"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="blur"><feGaussianBlur stdDeviation="2.8"/></filter>
          <radialGradient id="groundsGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#6D4C41"/><stop offset="100%" stop-color="#3E2723"/></radialGradient><radialGradient id="moundGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#795548"/><stop offset="100%" stop-color="#4E342E"/></radialGradient>
        </defs>
        <rect width="200" height="200" rx="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

<!-- filter paper cone -->
<path d="M65,52 L100,135 L135,52 Z" fill="#EEEEEE" stroke="#BDBDBD" stroke-width="1.8" filter="url(#shadow)"/>
<path d="M65,52 L80,52" stroke="#BDBDBD" stroke-width="1"/>
<!-- grounds in filter -->
<path d="M72,88 C72,88 80,72 100,72 C120,72 128,88 128,88 L124,120 C120,130 110,134 100,134 C90,134 80,130 76,120 Z"
      fill="url(#groundsGrad)"/>
<!-- texture dots in cone -->
<circle cx="88" cy="95" r="2.5" fill="#4E342E"/><circle cx="100" cy="88" r="3" fill="#4E342E"/>
<circle cx="112" cy="95" r="2.5" fill="#4E342E"/><circle cx="95" cy="105" r="2" fill="#4E342E"/>
<circle cx="108" cy="108" r="2.5" fill="#4E342E"/>
<!-- mound below -->
<ellipse cx="100" cy="148" rx="48" ry="18" fill="url(#moundGrad)" stroke="#3E2723" stroke-width="1.5"/>
<ellipse cx="100" cy="142" rx="42" ry="12" fill="#6D4C41"/>
<!-- texture on mound -->
<circle cx="84" cy="140" r="2" fill="#5D4037"/><circle cx="100" cy="138" r="2.5" fill="#5D4037"/>
<circle cx="116" cy="141" r="2" fill="#5D4037"/>
<text x="100" y="183" font-family="Arial" font-size="9" fill="#4E342E" text-anchor="middle">COFFEE GROUNDS</text>

      </svg>