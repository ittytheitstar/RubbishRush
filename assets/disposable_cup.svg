<path d="M96,42 L104,42 L106,75 L96,80 Z" fill="#90A4AE" stroke="#78909C" stroke-width="1"/>
<!-- SPOON right -->
<rect x="139" y="75" width="9" height="85" rx="4" fill="#CFD8DC" stroke="#78909C" stroke-width="1.5"/>
