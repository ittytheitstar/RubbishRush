      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
        <defs>
          <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feFlood flood-color="#00000030"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="blur"><feGaussianBlur stdDeviation="2.8"/></filter>
          <linearGradient id="dgGrad" x1="0%" y1="0%" x2="100%" y2="0"><stop offset="0%" stop-color="#BBDEFB"/><stop offset="25%" stop-color="#E3F2FD"/><stop offset="75%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient><linearGradient id="dgBase" x1="0%" y1="0%" x2="0%" y2="100"><stop offset="0%" stop-color="#BBDEFB"/><stop offset="100%" stop-color="#64B5F6"/></linearGradient>
        </defs>
        <rect width="200" height="200" rx="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

<!-- tumbler shape -->
<path d="M 62,42 L 56,162 C 56,168 70,172 100,172 C 130,172 144,168 144,162 L 138,42 Z"
      fill="url(#dgGrad)" stroke="#1565C0" stroke-width="1.8" filter="url(#shadow)" fill-opacity="0.6"/>
<!-- rim -->
<ellipse cx="100" cy="42" rx="38" ry="8" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
<!-- base -->
<ellipse cx="100" cy="162" rx="44" ry="10" fill="url(#dgBase)" stroke="#1565C0" stroke-width="1.5" opacity="0.8"/>
<!-- crack -->
<path d="M 98,42 L 92,95 L 108,112 L 100,162" fill="none" stroke="#B71C1C" stroke-width="2.5" stroke-linecap="round"/>
<line x1="108" y1="112" x2="126" y2="100" stroke="#B71C1C" stroke-width="2" stroke-linecap="round"/>
<!-- specular -->
<rect x="68" y="50" width="8" height="100" rx="4" fill="white" opacity="0.3"/>
<text x="100" y="190" font-family="Arial" font-size="9" fill="#1565C0" text-anchor="middle">BROKEN DRINKING GLASS</text>

      </svg>