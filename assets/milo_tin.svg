  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
    <defs>
      <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
        <feOffset dx="0" dy="3" result="offsetblur"/>
        <feFlood flood-color="#00000030"/>
        <feComposite in2="offsetblur" operator="in"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="blur"><feGaussianBlur stdDeviation="2.8"/></filter>
      <radialGradient id="topGrad" cx="40%" cy="35%" r="80%"><stop offset="0%" stop-color="#2E7D32"/><stop offset="100%" stop-color="#1B5E20"/></radialGradient><linearGradient id="canGrad" x1="0%" y1="0%" x2="100%" y2="0"><stop offset="0%" stop-color="#1B5E20"/><stop offset="18%" stop-color="#1B5E20"/><stop offset="45%" stop-color="#4CAF50"/><stop offset="55%" stop-color="#4CAF50"/><stop offset="82%" stop-color="#1B5E20"/><stop offset="100%" stop-color="#1B5E20"/></linearGradient>
    </defs>
    <rect width="200" height="200" rx="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

<!-- body -->
<rect x="62" y="72" width="76" height="90" fill="url(#canGrad)" stroke="#1A1A1A" stroke-width="1.5"/>
<!-- top ellipse -->
<ellipse cx="100" cy="72" rx="38" ry="10" fill="url(#topGrad)" stroke="#1A1A1A" stroke-width="1.5"/>
<!-- bottom ellipse -->
<ellipse cx="100" cy="162" rx="38" ry="10" fill="#1B5E20" stroke="#1A1A1A" stroke-width="1.5"/>
<!-- rim detail -->
<rect x="62" y="75" width="76" height="6" fill="#388E3C" opacity="0.5"/>
<rect x="62" y="156" width="76" height="6" fill="#388E3C" opacity="0.5"/>
<!-- pull tab -->
<ellipse cx="100" cy="63" rx="10" ry="3" fill="#2E7D32" stroke="#777" stroke-width="1"/>
<path d="M96,60 L100,55 L104,60" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round"/>
<!-- specular highlight -->
<rect x="66" y="80" width="8" height="68" rx="4" fill="white" opacity="0.2"/>
<rect x="65" y="88" width="70" height="60" fill="#2E7D32" opacity="0.6"/>
<text x="100" y="116" font-family="Arial" font-size="18" font-weight="bold" fill="#FFF8E1" text-anchor="middle" filter="url(#blur)">MILO</text><text x="100" y="116" font-family="Arial" font-size="18" font-weight="bold" fill="#FFF8E1" opacity="0.35" text-anchor="middle">MILO</text><text x="100" y="132" font-family="Arial" font-size="7" fill="#C8E6C9" text-anchor="middle">ENERGY DRINK MIX</text>

  </svg>