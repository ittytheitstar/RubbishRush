      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
        <defs>
          <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feFlood flood-color="#00000030"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="blur"><feGaussianBlur stdDeviation="2.8"/></filter>
          <linearGradient id="moGrad" x1="0%" y1="0%" x2="100%" y2="0"><stop offset="0%" stop-color="#212121"/><stop offset="30%" stop-color="#424242"/><stop offset="70%" stop-color="#424242"/><stop offset="100%" stop-color="#212121"/></linearGradient><linearGradient id="moCap" x1="0%" y1="0%" x2="0%" y2="100"><stop offset="0%" stop-color="#37474F"/><stop offset="100%" stop-color="#1A1A1A"/></linearGradient>
        </defs>
        <rect width="200" height="200" rx="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

<!-- jug body -->
<path d="M58,72 L56,168 C56,175 72,178 100,178 C128,178 144,175 144,168 L142,72 Z"
      fill="url(#moGrad)" stroke="#1A1A1A" stroke-width="2" filter="url(#shadow)"/>
<!-- shoulder -->
<path d="M58,72 L65,52 L135,52 L142,72" fill="#2D2D2D" stroke="#1A1A1A" stroke-width="1.5"/>
<!-- neck -->
<rect x="75" y="38" width="50" height="18" rx="6" fill="url(#moCap)" stroke="#1A1A1A" stroke-width="1.5"/>
<!-- cap -->
<rect x="80" y="28" width="40" height="14" rx="5" fill="#37474F" stroke="#1A1A1A" stroke-width="1.5"/>
<!-- handle -->
<path d="M142,84 C162,84 165,110 165,128 C165,148 158,160 142,158" fill="none" stroke="#424242" stroke-width="12" stroke-linecap="round"/>
<!-- label -->
<rect x="62" y="90" width="78" height="60" rx="4" fill="#424242" opacity="0.5"/>
<text x="100" y="118" font-family="Arial" font-size="9" font-weight="bold" fill="#90A4AE" text-anchor="middle">MOTOR OIL</text>
<text x="100" y="131" font-family="Arial" font-size="7" fill="#78909C" text-anchor="middle">USED / WASTE</text>
<!-- specular highlight -->
<rect x="62" y="80" width="8" height="80" rx="4" fill="white" opacity="0.12"/>

      </svg>