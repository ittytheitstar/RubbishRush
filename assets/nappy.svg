      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
        <defs>
          <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feFlood flood-color="#00000030"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="blur"><feGaussianBlur stdDeviation="2.8"/></filter>
          <linearGradient id="napGrad" x1="0%" y1="0%" x2="100%" y2="0"><stop offset="0%" stop-color="#E8EAF6"/><stop offset="50%" stop-color="#FAFAFA"/><stop offset="100%" stop-color="#E8EAF6"/></linearGradient><radialGradient id="wetGrad" cx="50%" cy="60%" r="40%"><stop offset="0%" stop-color="#FFFF99"/><stop offset="100%" stop-color="#FFFF99"/></radialGradient>
        </defs>
        <rect width="200" height="200" rx="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

<!-- main body -->
<path d="M50,80 C40,80 32,90 32,105 L32,148 C32,162 40,170 58,170 L142,170 C160,170 168,162 168,148 L168,105 C168,90 160,80 150,80 C142,68 125,58 100,58 C75,58 58,68 50,80 Z"
      fill="url(#napGrad)" stroke="#9FA8DA" stroke-width="1.8" filter="url(#shadow)"/>
<!-- taping tabs -->
<rect x="28" y="86" width="28" height="22" rx="8" fill="#C5CAE9" stroke="#9FA8DA" stroke-width="1.5"/>
<rect x="144" y="86" width="28" height="22" rx="8" fill="#C5CAE9" stroke="#9FA8DA" stroke-width="1.5"/>
<rect x="28" y="116" width="28" height="22" rx="8" fill="#C5CAE9" stroke="#9FA8DA" stroke-width="1.5"/>
<rect x="144" y="116" width="28" height="22" rx="8" fill="#C5CAE9" stroke="#9FA8DA" stroke-width="1.5"/>
<!-- taping strip -->
<rect x="68" y="90" width="64" height="26" rx="5" fill="#9FA8DA" stroke="#7986CB" stroke-width="1"/>
<!-- wetness indicator (yellow stripe) -->
<rect x="90" y="118" width="20" height="40" rx="5" fill="#FFF176" opacity="0.7"/>
<!-- branding line -->
<text x="100" y="182" font-family="Arial" font-size="9" fill="#7986CB" text-anchor="middle">BABY DIAPER</text>

