      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
        <defs>
          <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feFlood flood-color="#00000030"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="blur"><feGaussianBlur stdDeviation="2.8"/></filter>
          <radialGradient id="sdGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ECEFF1"/><stop offset="80%" stop-color="#F5F5F5"/><stop offset="100%" stop-color="#B0BEC5"/></radialGradient><radialGradient id="sdBtn" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#546E7A"/><stop offset="100%" stop-color="#263238"/></radialGradient>
        </defs>
        <rect width="200" height="200" rx="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

<!-- main disc -->
<ellipse cx="100" cy="115" rx="70" ry="14" fill="#78909C" opacity="0.3" filter="url(#shadow)"/>
<circle cx="100" cy="100" r="68" fill="url(#sdGrad)" stroke="#90A4AE" stroke-width="1.8"/>
<!-- depth edge -->
<circle cx="100" cy="102" r="68" fill="none" stroke="#B0BEC5" stroke-width="2"/>
<!-- inner ring -->
<circle cx="100" cy="100" r="52" fill="none" stroke="#CFD8DC" stroke-width="1.5"/>
<!-- vent slots -->
<rect x="56" y="76" width="32" height="6" rx="3" fill="#90A4AE" opacity="0.6"/>
<rect x="62" y="88" width="36" height="6" rx="3" fill="#90A4AE" opacity="0.6"/>
<rect x="56" y="100" width="32" height="6" rx="3" fill="#90A4AE" opacity="0.6"/>
<rect x="112" y="76" width="32" height="6" rx="3" fill="#90A4AE" opacity="0.6"/>
<rect x="102" y="88" width="36" height="6" rx="3" fill="#90A4AE" opacity="0.6"/>
<rect x="112" y="100" width="32" height="6" rx="3" fill="#90A4AE" opacity="0.6"/>
<!-- centre button -->
<circle cx="100" cy="100" r="18" fill="url(#sdBtn)" stroke="#455A64" stroke-width="1.5"/>
<!-- test button -->
<circle cx="100" cy="100" r="9" fill="#37474F" stroke="#546E7A" stroke-width="1"/>
<text x="100" y="100" font-family="Arial" font-size="6" fill="#90A4AE" text-anchor="middle" dominant-baseline="middle">TEST</text>
<!-- LED -->
<circle cx="100" cy="54" r="6" fill="#F44336"/>
<circle cx="98" cy="52" r="2" fill="#FF8A80" opacity="0.7"/>

      </svg>