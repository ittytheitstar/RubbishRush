      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
        <defs>
          <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feFlood flood-color="#00000030"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="blur"><feGaussianBlur stdDeviation="2.8"/></filter>
          <linearGradient id="scGrad" x1="0%" y1="0%" x2="100%" y2="0"><stop offset="0%" stop-color="#388E3C"/><stop offset="35%" stop-color="#66BB6A"/><stop offset="65%" stop-color="#66BB6A"/><stop offset="100%" stop-color="#388E3C"/></linearGradient><linearGradient id="scTrig" x1="0%" y1="0%" x2="100%" y2="0"><stop offset="0%" stop-color="#2E7D32"/><stop offset="100%" stop-color="#4CAF50"/></linearGradient>
        </defs>
        <rect width="200" height="200" rx="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

<!-- bottle body -->
<path d="M72,82 L70,165 C70,172 78,175 100,175 C122,175 130,172 130,165 L128,82 Z"
      fill="url(#scGrad)" stroke="#2D2D2D" stroke-width="1.8" filter="url(#shadow)"/>
<!-- shoulder -->
<path d="M72,82 L76,62 L124,62 L128,82" fill="#388E3C" stroke="#2D2D2D" stroke-width="1.5"/>
<!-- neck -->
<rect x="85" y="50" width="30" height="16" rx="5" fill="#2E7D32" stroke="#2D2D2D" stroke-width="1.5"/>
<!-- trigger body -->
<path d="M85,55 C68,60 62,72 60,88 L74,88 L78,72 Z" fill="url(#scTrig)" stroke="#2D2D2D" stroke-width="1.5"/>
<!-- nozzle -->
<rect x="55" y="84" width="24" height="9" rx="4" fill="#1B5E20" stroke="#2D2D2D" stroke-width="1.5"/>
<!-- spray mist -->
<circle cx="44" cy="76" r="5" fill="#A5D6A7" opacity="0.7"/>
<circle cx="34" cy="68" r="4" fill="#A5D6A7" opacity="0.55"/>
<circle cx="46" cy="62" r="3.5" fill="#A5D6A7" opacity="0.45"/>
<circle cx="30" cy="80" r="3" fill="#A5D6A7" opacity="0.35"/>
<!-- warning label -->
<rect x="73" y="95" width="54" height="48" rx="4" fill="#FFEB3B" stroke="#F9A825" stroke-width="1.5"/>
<text x="100" y="118" font-family="Arial" font-size="22" text-anchor="middle">⚠</text>
<text x="100" y="136" font-family="Arial" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">HAZARDOUS</text>
<!-- specular -->
<rect x="74" y="88" width="7" height="72" rx="3" fill="white" opacity="0.2"/>

      </svg>