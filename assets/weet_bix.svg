      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
        <defs>
          <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feFlood flood-color="#00000030"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="blur"><feGaussianBlur stdDeviation="2.8"/></filter>
          <linearGradient id="wbGrad" x1="0%" y1="0%" x2="0%" y2="100"><stop offset="0%" stop-color="#D4A96A"/><stop offset="100%" stop-color="#B8854E"/></linearGradient><linearGradient id="wbBite" x1="0%" y1="0%" x2="100%" y2="0"><stop offset="0%" stop-color="#E8C488"/><stop offset="100%" stop-color="#D4A96A"/></linearGradient>
        </defs>
        <rect width="200" height="200" rx="20" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>

<!-- biscuit base -->
<rect x="32" y="72" width="136" height="68" rx="6" fill="url(#wbGrad)" stroke="#8D6E28" stroke-width="1.8" filter="url(#shadow)"/>
<!-- wheat grain texture lines -->
<line x1="32" y1="84" x2="168" y2="84" stroke="#C49040" stroke-width="1.5"/>
<line x1="32" y1="96" x2="168" y2="96" stroke="#C49040" stroke-width="1.5"/>
<line x1="32" y1="108" x2="168" y2="108" stroke="#C49040" stroke-width="1.5"/>
<line x1="32" y1="120" x2="168" y2="120" stroke="#C49040" stroke-width="1.5"/>
<line x1="32" y1="132" x2="168" y2="132" stroke="#C49040" stroke-width="1.5"/>
<line x1="60" y1="72" x2="60" y2="140" stroke="#C49040" stroke-width="1"/>
<line x1="88" y1="72" x2="88" y2="140" stroke="#C49040" stroke-width="1"/>
<line x1="116" y1="72" x2="116" y2="140" stroke="#C49040" stroke-width="1"/>
<line x1="144" y1="72" x2="144" y2="140" stroke="#C49040" stroke-width="1"/>
<!-- bitten off corner (top-left) -->
<path d="M32,72 C32,72 52,80 68,72 C68,72 42,96 32,96 Z" fill="#FAFAFA" stroke="#8D6E28" stroke-width="1.5"/>
<!-- crumbs -->
<circle cx="22" cy="110" r="4" fill="#D4A96A"/>
<circle cx="14" cy="128" r="3" fill="#D4A96A"/>
<circle cx="28" cy="140" r="3.5" fill="#D4A96A"/>
<circle cx="18" cy="96" r="2.5" fill="#D4A96A"/>
<!-- box label nearby -->
<text x="108" y="160" font-family="Arial" font-size="9" fill="#8D6E28" text-anchor="middle">HALF-EATEN WEETBIX</text>

      </svg>